builds:
  - binary: autobs
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    main: .

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
